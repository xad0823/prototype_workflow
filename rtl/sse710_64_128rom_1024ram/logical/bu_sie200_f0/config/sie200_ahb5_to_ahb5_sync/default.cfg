config_name: default
parameters:
  ADDR_WIDTH    : 32  # Define the address width of AHB bridge
  DATA_WIDTH    : 32  # Define the data width of AHB bridge
  MASTER_WIDTH  : 4   # Define the master number width of AHB bridge
  USER_WIDTH    : 1
  BURST         : 0   # Indicate whether support burst transaction: 0: no support, 1: support
  EXT_GATE_SYNC : 0   # External gate request signal is synchronous to the clock. Default: 0 (async), set to 1 to remove synchronization logic.

