config_name: default
parameters:
  ADDR_WIDTH      : 32           # Address Bus Width
  MASTER_WIDTH    : 4            # Master Width
  USER_WIDTH      : 1            # User Bus Width
  QS_CLOCK_EN     : 1            # Upstream (Slave) side Q-channel is present for clock [values:1 or 0]
  QM_CLOCK_EN     : 1            # Downstream (Master) side Q-channel is present for clock [values:1 or 0]
  QS_POWER_EN     : 1            # Power Q-channel is present. [values:1 or 0]
  QS_SYNC         : 0            # Upstream (Slave) side Q-channel signals are synchronous to the upstream clock. [values:0 or 1, 1 removes Q-channel synchronization logic]
  QM_SYNC         : 0            # Downstream (Master) side Q-channel signals are synchronous to the downstream clock. [values:0 or 1, 1 removes Q-channel synchronization logic]
  EXT_GATE_SYNC   : 0            # External gate request signal is synchronous to the upstream clock. [values:0 or 1, 1 removes synchronization logic]
