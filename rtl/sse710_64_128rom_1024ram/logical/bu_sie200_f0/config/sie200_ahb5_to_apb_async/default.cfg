config_name: default
parameters:
  ADDR_WIDTH      : 32 # Parameter to define address width, 32 = 2^32 = 4GB APB address space
  MASTER_WIDTH    : 4
  QS_CLOCK_EN     : 1  # Upstream (Slave) side Q-channel is present
  QM_CLOCK_EN     : 1  # Downstream (Master) side Q-channel is present
  QS_POWER_EN     : 1  # Power Q-channel is present. When QS_POWER_EN=1, then QS_CLOCK_EN and QM_CLOCK_EN are both set to 1 automatically.
  QS_SYNC         : 0  # Upstream (Slave) side Q-channel signals are synchronous to the upstream clock
  QM_SYNC         : 0  # Downstream (Master) side Q-channel signals are synchronous to the downstream clock
  EXT_GATE_SYNC   : 0  # External gate request signal is synchronous to the upstream clock

