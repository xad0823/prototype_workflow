config_name: default
parameters:
  ADDR_WIDTH    : 32  # Define the address width of AHB bridge
  DATA_WIDTH    : 32  # Define the data width of AHB bridge
  MASTER_WIDTH  : 4   # Define the width of HMASTER signal
  USER_WIDTH    : 1   # Define the width of HMASTER signal
  BURST         : 0   # Define whether support burst transfer: 0: not support, burst transfers are converted to single transfers; 1: supported
  WRITE_BUFFER  : 0   # Define whether support write buffer: 0: not support, up stream AHB need to wait for all transfer completions; 1: supported, up stream AHB do not have to wait for completion of single bufferable writes
