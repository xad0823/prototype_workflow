#----------------------------------------------------------------------------
#  Purpose : Example configuration file for sie200_ahb5_timeout_mon
#----------------------------------------------------------------------------
config_name: default
parameters:
  ADDR_WIDTH      : 32     # Address Width
  DATA_WIDTH      : 32     # Data Width
  MASTER_WIDTH    : 4      # Master signal width
  USER_WIDTH      : 1      # User extension signals width
  TIMEOUT_VALUE   : 16     # Number of wait cycles that trigger timeout (valid values: 2-1024)
  STRICT_AHB_COMP : 1      # 1: Break up bursts into single accesses to insert IDLE states between burst beats
                           #    to be able to abort the transaction at any time without protocol violation.
                           #    Also HWDATA and HWUSER are registered and kept stable when entering timeout state.
                           # 0: Let the HTRANS and HBURST signals go through unchanged, but when the slave
                           #    gets unresponsive the transaction is terminated instantly violating the protocol.
                           #    HWDATA and HWUSER are not registered (the module is smaller), they are transparent
                           #    also in timeout state so when they change on the slave side they will violate the
                           #    protocol on the master side if the timed out transaction is still waited.
